services:
  opentoken:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opentoken
    restart: unless-stopped
    ports:
      - "32117:32117"
    volumes:
      - opentoken_data:/home/opentoken/.opentoken
      # 如需自定义配置，取消下方注释并挂载 config.yaml
      # - ./config.yaml:/app/config.yaml:ro
    environment:
      - TZ=Asia/Shanghai
      - OPENTOKEN_ADMIN_PASSWORD=changeme
      # 可选：自定义状态目录和配置文件路径
      # - OPENTOKEN_STATE_DIR=/home/opentoken/.opentoken
      # - OPENTOKEN_CONFIG_PATH=/app/config.yaml
      # 如需代理，取消下方注释
      # - HTTP_PROXY=http://host.docker.internal:7890
      # - HTTPS_PROXY=http://host.docker.internal:7890
    # 浏览器需要共享内存，建议设置 shm_size
    shm_size: "1gb"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:32117/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  opentoken_data:
    driver: local
